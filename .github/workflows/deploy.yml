name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker image
      run: |
        docker build -t cloud-project ./cloud-project-docker

    - name: Tag Docker image
      run: |
        docker tag cloud-project:latest 149536456043.dkr.ecr.us-east-1.amazonaws.com/cloud-project:latest

    - name: Push image to ECR
      run: |
        docker push 149536456043.dkr.ecr.us-east-1.amazonaws.com/cloud-project:latest